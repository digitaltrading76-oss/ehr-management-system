<!DOCTYPE html>
<html>
<head>
  <title>HR Case AI Web App MVP</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="container">
    <h1>HR Case AI Web App MVP</h1>
    <p class="subtitle">AI-assisted incident classification, policy matching, labor law fallback, and missing evidence review.</p>

    <div class="card">
      <h2>Case Input</h2>
      <label>Employee Name</label>
      <input id="employee_name" value="Mary June Melvines Dajay">

      <label>Position</label>
      <input id="position" value="Rider">

      <label>Incident Date</label>
      <input id="incident_date" value="2026-06-17">

      <label>Prior Offense Count</label>
      <input id="prior_offense_count" type="number" value="0">

      <label>Incident / Explanation Text</label>
      <textarea id="incident_text">Ako po si Mary June Melvines Dajay ay humihingi ng paumanhin dahil po sa 15 parcel counts po dahil mali ang proof of onhold dahil minsan mahina ang signal ko at hindi ma accurate ang timestamp ko at minsan po ay iba ang area na dala ko po dahil striker. Kung po ako may mga lugar na sobrang hina talaga ang signal at magti-time stamp ako, hindi lumalabas kung saan lugar, petsa at oras lamang ang lumalabas. Pasensya po talaga sa aking nagawa. Sana mabigyan nyo pa po ako ng isang pagkakataon.</textarea>

      <button onclick="analyze()">Analyze Case</button>
    </div>

    <div class="card">
      <h2>AI Case Analysis Output</h2>
      <pre id="result">Click Analyze Case...</pre>
      <button onclick="downloadJSON()">Download JSON Report</button>
    </div>
  </div>

<script>
let latestResult = null;

async function analyze() {
  const formData = new FormData();
  formData.append("employee_name", document.getElementById("employee_name").value);
  formData.append("position", document.getElementById("position").value);
  formData.append("incident_date", document.getElementById("incident_date").value);
  formData.append("prior_offense_count", document.getElementById("prior_offense_count").value);
  formData.append("incident_text", document.getElementById("incident_text").value);

  const res = await fetch("/analyze", { method: "POST", body: formData });
  latestResult = await res.json();
  document.getElementById("result").textContent = JSON.stringify(latestResult, null, 2);
}

function downloadJSON() {
  if (!latestResult) {
    alert("Analyze a case first.");
    return;
  }
  const blob = new Blob([JSON.stringify(latestResult, null, 2)], {type: "application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "hr_case_analysis_report.json";
  a.click();
  URL.revokeObjectURL(url);
}
</script>
</body>
</html>
